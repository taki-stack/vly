<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Physics Shooter Mobile</title>
<style>
  body { margin:0; background:#0b0f1a; color:white; font-family:Arial; overflow:hidden; touch-action:none }
  canvas { display:block }
  #ui { position:absolute; top:10px; left:10px; font-size:14px }
  #questionBox {
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    padding:12px;
    border-radius:12px;
    width:90%;
  }
  button { margin:5px; font-size:16px; padding:10px; border-radius:8px }
  #skills {
    position:absolute;
    right:10px;
    bottom:10px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  Score: <span id="score">0</span><br>
  HP: <span id="hp">5</span><br>
  Combo: <span id="combo">0</span>
</div>

<div id="skills">
  <button onclick="slowTime=200">Slow</button>
  <button onclick="fiftyFifty()">50/50</button>
</div>

<div id="questionBox" style="display:none">
  <div id="question"></div>
  <div id="answers"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let score=0,hp=5,combo=0;
let bullets=[],targets=[],particles=[];
let touch={x:window.innerWidth/2,y:window.innerHeight/2};
let slowTime=0;
let currentQuestion=null;
let questions=[];

fetch("questions.json")
.then(res=>res.json())
.then(data=>questions=data)
.catch(()=>{
  questions=[
    {q:"Công thức động năng?",a:["1/2mv^2","mv^2","mgh"],correct:0}
  ];
});

canvas.addEventListener("touchmove",e=>{
  let t=e.touches[0];
  touch.x=t.clientX;
  touch.y=t.clientY;
});

canvas.addEventListener("touchstart",e=>{
  let t=e.touches[0];
  touch.x=t.clientX;
  touch.y=t.clientY;
  shoot();
});

function spawnTarget(){
  let typeRand=Math.random();
  let speed=2,size=30,type="easy";
  if(typeRand>0.7){type="hard";speed=4;size=20}
  else if(typeRand>0.4){type="medium";speed=3}

  targets.push({x:Math.random()*canvas.width,y:-20,r:size,speed:speed,type:type});
}

function shoot(){
  bullets.push({x:canvas.width/2,y:canvas.height-60,dx:(touch.x-canvas.width/2)/10,dy:(touch.y-canvas.height+60)/10});
}

function explosion(x,y){
  for(let i=0;i<12;i++){
    particles.push({x,y,dx:(Math.random()-0.5)*4,dy:(Math.random()-0.5)*4,life:25});
  }
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let speedFactor = slowTime>0 ? 0.4 : 1;
  if(slowTime>0) slowTime--;

  bullets.forEach(b=>{
    b.x+=b.dx; b.y+=b.dy;
    ctx.fillStyle="yellow";
    ctx.fillRect(b.x,b.y,6,6);
  });

  targets.forEach((t,i)=>{
    t.y+=t.speed*speedFactor;
    ctx.beginPath();
    ctx.arc(t.x,t.y,t.r,0,Math.PI*2);
    ctx.fillStyle=t.type==="hard"?"red":t.type==="medium"?"blue":"green";
    ctx.fill();

    bullets.forEach((b,bi)=>{
      let dx=b.x-t.x,dy=b.y-t.y;
      if(Math.sqrt(dx*dx+dy*dy)<t.r){
        bullets.splice(bi,1);
        explosion(t.x,t.y);
        askQuestion(t,i);
      }
    });

    if(t.y>canvas.height){ targets.splice(i,1); }
  });

  particles.forEach((p,i)=>{
    p.x+=p.dx; p.y+=p.dy; p.life--;
    ctx.fillStyle="orange";
    ctx.fillRect(p.x,p.y,3,3);
    if(p.life<=0) particles.splice(i,1);
  });

  // aim indicator
  ctx.beginPath();
  ctx.arc(touch.x,touch.y,12,0,Math.PI*2);
  ctx.strokeStyle="white";
  ctx.stroke();

  requestAnimationFrame(update);
}

function askQuestion(target,index){
  if(questions.length===0) return;
  currentQuestion=questions[Math.floor(Math.random()*questions.length)];
  const box=document.getElementById("questionBox");
  box.style.display="block";
  document.getElementById("question").innerText=currentQuestion.q;

  const ansDiv=document.getElementById("answers");
  ansDiv.innerHTML="";

  currentQuestion.a.forEach((ans,i)=>{
    const btn=document.createElement("button");
    btn.innerText=ans;
    btn.onclick=()=>{
      if(i===currentQuestion.correct){
        score+=100+combo*20; combo++;
        targets.splice(index,1);
      } else { hp--; combo=0; }
      updateUI();
      box.style.display="none";
    }
    ansDiv.appendChild(btn);
  });
}

function fiftyFifty(){
  const buttons=document.querySelectorAll("#answers button");
  let removed=0;
  buttons.forEach((btn,i)=>{
    if(i!==currentQuestion.correct && removed<2){
      btn.style.display="none";
      removed++;
    }
  });
}

function updateUI(){
  document.getElementById("score").innerText=score;
  document.getElementById("hp").innerText=hp;
  document.getElementById("combo").innerText=combo;
}

setInterval(spawnTarget,900);
update();
</script>
</body>
</html>
