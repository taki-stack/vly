<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duck Hunt Physics</title>

<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ⚠️ giữ pixel
ctx.imageSmoothingEnabled = false;

// ===== LOAD IMAGE =====
const duckImg = new Image();
duckImg.src = "./duck.png";

const bgImg = new Image();
bgImg.src = "./bg.png";

const gunImg = new Image();
gunImg.src = "./gun.png";

// ===== WAIT LOAD =====
let loaded = 0;
function checkLoad(){
  loaded++;
  if(loaded === 3){
    startGame();
  }
}

duckImg.onload = checkLoad;
bgImg.onload = checkLoad;
gunImg.onload = checkLoad;

// ===== GAME =====
function startGame(){

let bullets = [];
let ducks = [];

let hp = 10;
let score = 0;

let lastShot = 0;
const reloadTime = 1500;

// spawn duck
function spawnDuck(){
  let fromLeft = Math.random() > 0.5;
  ducks.push({
    x: fromLeft ? -60 : canvas.width + 60,
    y: Math.random() * canvas.height * 0.5,
    speed: fromLeft ? 4 : -4,
    state: "flying"
  });
}

// shoot
canvas.addEventListener("touchstart", e=>{
  let now = Date.now();
  if(now - lastShot < reloadTime) return;

  let t = e.touches[0];
  shoot(t.clientX, t.clientY);

  lastShot = now;
});

function shoot(tx, ty){
  let angle = Math.atan2(
    ty - (canvas.height - 80),
    tx - (canvas.width/2)
  );

  bullets.push({
    x: canvas.width/2,
    y: canvas.height - 80,
    dx: Math.cos(angle) * 12,
    dy: Math.sin(angle) * 12,
    state: "flying",
    target: null
  });
}

// draw
function drawDuck(d){
  ctx.drawImage(duckImg, d.x-25, d.y-25, 50, 50);
}

function drawGun(){
  ctx.drawImage(
    gunImg,
    canvas.width/2 - 30,
    canvas.height - 100,
    60,
    60
  );
}

// update
function update(){

  // background
  ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

  // bullets
  bullets.forEach((b,i)=>{
    if(b.state==="flying"){
      b.x+=b.dx;
      b.y+=b.dy;
    }

    ctx.fillStyle="red";
    ctx.fillRect(b.x,b.y,4,8);

    if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
      bullets.splice(i,1);
    }
  });

  // ducks
  ducks.forEach((d,i)=>{
    d.x += d.speed;
    drawDuck(d);

    bullets.forEach((b)=>{
      let dx=b.x-d.x;
      let dy=b.y-d.y;

      if(Math.sqrt(dx*dx+dy*dy)<25){
        ducks.splice(i,1);
        score++;
      }
    });

    if(d.x<-80||d.x>canvas.width+80){
      ducks.splice(i,1);
    }
  });

  drawGun();

  // UI
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("HP: "+hp, 10, 30);
  ctx.fillText("Score: "+score, 10, 60);

  // win lose
  if(hp<=0){
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER", canvas.width/2-120, canvas.height/2);
    return;
  }

  if(score>=15){
    ctx.font="40px Arial";
    ctx.fillText("YOU WIN", canvas.width/2-100, canvas.height/2);
    return;
  }

  requestAnimationFrame(update);
}

setInterval(spawnDuck, 1000);
update();

}
</script>
</body>
</html>
