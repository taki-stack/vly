<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duck Hunt Physics</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
}
canvas {
  display: block;
}

#questionBox {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 12px;
  border-radius: 10px;
  width: 90%;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="questionBox" style="display:none">
  <div id="question"></div>
  <div id="answers"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ⚠️ giữ pixel style
ctx.imageSmoothingEnabled = false;

// ===== LOAD IMAGES =====
const duckImg = new Image();
duckImg.src = "duck.png";

const bgImg = new Image();
bgImg.src = "bg.png";

const gunImg = new Image();
gunImg.src = "gun.png";

// ===== GAME STATE =====
let bullets = [];
let ducks = [];

let hp = 10;
let score = 0;

let lastShot = 0;
const reloadTime = 1500;

// ===== QUESTIONS =====
let questions = [
  {
    q: "Công thức động năng?",
    a: ["1/2mv^2", "mv^2", "mgh"],
    correct: 0
  }
];

// ===== SPAWN DUCK =====
function spawnDuck(){
  let fromLeft = Math.random() > 0.5;
  ducks.push({
    x: fromLeft ? -50 : canvas.width + 50,
    y: Math.random() * canvas.height * 0.5,
    speed: fromLeft ? 3 : -3,
    state: "flying"
  });
}

// ===== SHOOT =====
canvas.addEventListener("touchstart", e => {
  let now = Date.now();
  if(now - lastShot < reloadTime) return;

  let t = e.touches[0];
  shoot(t.clientX, t.clientY);

  lastShot = now;
});

function shoot(tx, ty){
  let angle = Math.atan2(
    ty - (canvas.height - 60),
    tx - (canvas.width/2)
  );

  bullets.push({
    x: canvas.width/2,
    y: canvas.height - 60,
    dx: Math.cos(angle) * 10,
    dy: Math.sin(angle) * 10,
    state: "flying",
    target: null
  });
}

// ===== DRAW =====
function drawDuck(d){
  ctx.drawImage(duckImg, d.x-25, d.y-25, 50, 50);
}

function drawGun(){
  ctx.drawImage(
    gunImg,
    canvas.width/2 - 30,
    canvas.height - 80,
    60,
    60
  );
}

// ===== QUESTION =====
function askQuestion(duck, bullet){
  let q = questions[Math.floor(Math.random()*questions.length)];

  let box = document.getElementById("questionBox");
  box.style.display = "block";

  document.getElementById("question").innerText = q.q;

  let ansDiv = document.getElementById("answers");
  ansDiv.innerHTML = "";

  q.a.forEach((ans, i) => {
    let btn = document.createElement("button");
    btn.innerText = ans;

    btn.onclick = () => {
      if(i === q.correct){
        bullet.state = "stick";
        bullet.target = duck;
        duck.state = "hit";
        score++;
      } else {
        bullet.state = "miss";
        duck.state = "attack";
        hp--;
      }

      box.style.display = "none";
    };

    ansDiv.appendChild(btn);
  });
}

// ===== UPDATE =====
function update(){
  // background
  ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

  // bullets
  bullets.forEach((b,i)=>{
    if(b.state==="flying"){
      b.x+=b.dx;
      b.y+=b.dy;
    }
    else if(b.state==="miss"){
      b.y+=6;
    }
    else if(b.state==="stick" && b.target){
      b.x=b.target.x;
      b.y=b.target.y;
    }

    ctx.fillStyle="red";
    ctx.fillRect(b.x,b.y,4,8);

    if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
      bullets.splice(i,1);
    }
  });

  // ducks
  ducks.forEach((d,i)=>{
    if(d.state==="flying") d.x+=d.speed;
    if(d.state==="attack") d.y+=6;

    drawDuck(d);

    bullets.forEach((b)=>{
      if(b.state!=="flying") return;

      let dx=b.x-d.x;
      let dy=b.y-d.y;

      if(Math.sqrt(dx*dx+dy*dy)<25){
        b.state="idle";
        askQuestion(d,b);
      }
    });

    if(d.x<-60||d.x>canvas.width+60||d.y>canvas.height){
      ducks.splice(i,1);
    }
  });

  drawGun();

  // UI text
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("HP: "+hp, 10, 30);
  ctx.fillText("Score: "+score, 10, 60);

  // win / lose
  if(hp<=0){
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER", canvas.width/2-120, canvas.height/2);
    return;
  }

  if(score>=15){
    ctx.font="40px Arial";
    ctx.fillText("YOU WIN", canvas.width/2-100, canvas.height/2);
    return;
  }

  requestAnimationFrame(update);
}

// ===== START =====
setInterval(spawnDuck, 1000);
update();

</script>
</body>
</html>
