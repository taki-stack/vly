<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Shooter</title>

<style>
body { margin:0; overflow:hidden; font-family: Arial; }
canvas { display:block; }

/* UI overlay */
#ui {
  position: absolute;
  top:0; left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
}

#box {
  width:85%;
  background: rgba(0,0,0,0.9);
  border-radius:20px;
  padding:20px;
  color:white;
  text-align:center;
}

#question {
  font-size:18px;
  margin-bottom:15px;
}

#answer {
  width:100%;
  padding:10px;
  font-size:18px;
  border:none;
  border-radius:10px;
}

#submit {
  margin-top:10px;
  padding:10px;
  width:100%;
  font-size:18px;
  background:#00c853;
  color:white;
  border:none;
  border-radius:10px;
}

#timer {
  margin-top:10px;
  color:yellow;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
  <div id="box">
    <div id="question"></div>
    <input id="answer" placeholder="Nhập đáp án...">
    <button id="submit">OK</button>
    <div id="timer"></div>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const ui = document.getElementById("ui");
const questionBox = document.getElementById("question");
const answerInput = document.getElementById("answer");
const submitBtn = document.getElementById("submit");
const timerText = document.getElementById("timer");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

ctx.imageSmoothingEnabled = false;

// ===== LOAD IMAGE =====
const duckImg = new Image();
duckImg.src = "./duck.png";

const bgImg = new Image();
bgImg.src = "./bg.png";

const gunImg = new Image();
gunImg.src = "./gun.png";

// ===== QUESTIONS =====
let questions = [];

fetch("./questions.json")
.then(res => res.json())
.then(data => questions = data);

// ===== GAME =====
let bullets = [];
let ducks = [];

let hp = 10;
let score = 0;

// ammo
let ammo = 20;
const maxAmmo = 20;
let reloading = false;

let lastShot = 0;
const reloadTime = 300;

// question
let answering = false;
let currentQuestion = null;
let timer = 30;
let timerInterval = null;

// ===== SPAWN =====
function spawnDuck(){
  let fromLeft = Math.random() > 0.5;
  ducks.push({
    x: fromLeft ? -60 : canvas.width + 60,
    y: Math.random() * canvas.height * 0.5,
    speed: fromLeft ? 3 : -3
  });
}

// ===== SHOOT =====
canvas.addEventListener("touchstart", e=>{
  if(answering) return;

  let now = Date.now();

  if(reloading) return;
  if(ammo <= 0){
    reloadAmmo();
    return;
  }

  if(now - lastShot < reloadTime) return;

  let t = e.touches[0];
  shoot(t.clientX, t.clientY);

  ammo--;
  lastShot = now;

  if(ammo <= 0) reloadAmmo();
});

function shoot(tx, ty){
  let angle = Math.atan2(
    ty - (canvas.height - 80),
    tx - (canvas.width/2)
  );

  bullets.push({
    x: canvas.width/2,
    y: canvas.height - 80,
    dx: Math.cos(angle)*12,
    dy: Math.sin(angle)*12
  });
}

// ===== RELOAD =====
function reloadAmmo(){
  if(reloading) return;
  reloading = true;

  setTimeout(()=>{
    ammo = maxAmmo;
    reloading = false;
  },1500);
}

// ===== HIT → QUESTION =====
function hitDuck(index){
  ducks.splice(index,1);

  currentQuestion = questions[Math.floor(Math.random()*questions.length)];

  showQuestion();
}

// ===== UI =====
function showQuestion(){
  answering = true;
  ui.style.display = "flex";

  questionBox.innerText = currentQuestion.question;
  answerInput.value = "";
  answerInput.focus();

  timer = 30;
  timerText.innerText = "Time: 30";

  timerInterval = setInterval(()=>{
    timer--;
    timerText.innerText = "Time: " + timer;

    if(timer <= 0){
      clearInterval(timerInterval);
      wrongAnswer();
    }
  },1000);
}

submitBtn.onclick = checkAnswer;

function checkAnswer(){
  clearInterval(timerInterval);

  let user = answerInput.value.trim();
  let correct = currentQuestion.answer;

  if(user == correct){
    score++;
  } else {
    hp--;
  }

  hideUI();
}

function wrongAnswer(){
  hp--;
  hideUI();
}

function hideUI(){
  answering = false;
  ui.style.display = "none";
}

// ===== DRAW =====
function drawDuck(d){
  ctx.drawImage(duckImg, d.x-25, d.y-25, 50, 50);
}

function drawGun(){
  ctx.drawImage(gunImg, canvas.width/2 - 30, canvas.height - 100, 60, 60);
}

// ===== UPDATE =====
function update(){

  ctx.drawImage(bgImg,0,0,canvas.width,canvas.height);

  // bullets
  bullets.forEach((b,i)=>{
    b.x+=b.dx;
    b.y+=b.dy;

    ctx.fillStyle="red";
    ctx.fillRect(b.x,b.y,4,8);

    if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
      bullets.splice(i,1);
    }
  });

  // ducks
  ducks.forEach((d,i)=>{
    d.x+=d.speed;
    drawDuck(d);

    bullets.forEach((b)=>{
      let dx=b.x-d.x;
      let dy=b.y-d.y;

      if(Math.sqrt(dx*dx+dy*dy)<25){
        hitDuck(i);
      }
    });

    if(d.x<-80||d.x>canvas.width+80){
      ducks.splice(i,1);
    }
  });

  drawGun();

  // UI
  ctx.fillStyle="white";
  ctx.font="18px Arial";
  ctx.fillText("HP: "+hp,10,30);
  ctx.fillText("Score: "+score,10,55);

  // ammo
  ctx.fillText("Ammo:",10,80);
  for(let i=0;i<maxAmmo;i++){
    ctx.fillStyle = i<ammo ? "yellow":"gray";
    ctx.fillRect(70+i*6,70,4,12);
  }

  if(reloading){
    ctx.fillStyle="red";
    ctx.fillText("RELOADING...",10,100);
  }

  // end
  if(hp<=0){
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER",canvas.width/2-120,canvas.height/2);
    return;
  }

  if(score>=15){
    ctx.font="40px Arial";
    ctx.fillText("YOU WIN",canvas.width/2-100,canvas.height/2);
    return;
  }

  requestAnimationFrame(update);
}

setInterval(spawnDuck,1200);
update();

</script>
</body>
</html>
