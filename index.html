<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Duck Physics Shooter</title>
<style>
  body { margin:0; background:#0b0f1a; overflow:hidden; color:white; font-family:Arial }
  canvas { display:block }
  #questionBox {
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    padding:10px;
    border-radius:10px;
    width:90%;
  }
  button { margin:5px; padding:8px }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="questionBox" style="display:none">
  <div id="question"></div>
  <div id="answers"></div>
</div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){ canvas.width=innerWidth; canvas.height=innerHeight }
resize(); window.addEventListener("resize",resize);

let bullets=[],ducks=[];
let hp=10, score=0;
let touch={x:canvas.width/2,y:canvas.height/2};

let questions=[
  {q:"Công thức động năng?",a:["1/2mv^2","mv^2","mgh"],correct:0}
];

canvas.addEventListener("touchmove",e=>{
  let t=e.touches[0];
  touch.x=t.clientX; touch.y=t.clientY;
});
canvas.addEventListener("touchstart",shoot);

function spawnDuck(){
  let fromLeft=Math.random()>0.5;
  ducks.push({
    x: fromLeft?-40:canvas.width+40,
    y: Math.random()*canvas.height*0.6,
    speed: fromLeft?3:-3,
    r:20,
    state:"flying"
  });
}

function shoot(){
  let angle=Math.atan2(touch.y-(canvas.height-50),touch.x-(canvas.width/2));
  bullets.push({
    x:canvas.width/2,
    y:canvas.height-50,
    dx:Math.cos(angle)*8,
    dy:Math.sin(angle)*8,
    state:"flying",
    target:null
  });
}

function drawDuck(d){
  ctx.fillStyle="yellow";
  ctx.beginPath(); ctx.arc(d.x,d.y,15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="orange";
  ctx.fillRect(d.x+10,d.y-3,8,6); // mỏ
}

function drawGun(){
  let x=canvas.width/2, y=canvas.height-50;
  ctx.fillStyle="white";
  ctx.fillRect(x-10,y,20,20);
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(touch.x,touch.y);
  ctx.strokeStyle="white";
  ctx.stroke();
}

function askQuestion(duck, bullet){
  const q=questions[Math.floor(Math.random()*questions.length)];
  const box=document.getElementById("questionBox");
  box.style.display="block";
  document.getElementById("question").innerText=q.q;

  const ansDiv=document.getElementById("answers");
  ansDiv.innerHTML="";

  q.a.forEach((ans,i)=>{
    const btn=document.createElement("button");
    btn.innerText=ans;
    btn.onclick=()=>{
      if(i===q.correct){
        bullet.state="stick";
        bullet.target=duck;
        duck.state="hit";
        score++;
      } else {
        bullet.state="miss";
        duck.state="attack";
        hp--;
      }
      box.style.display="none";
    }
    ansDiv.appendChild(btn);
  });
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // bullets
  bullets.forEach((b,i)=>{
    if(b.state==="flying"){
      b.x+=b.dx; b.y+=b.dy;
    } else if(b.state==="miss"){
      b.y+=5;
    } else if(b.state==="stick" && b.target){
      b.x=b.target.x; b.y=b.target.y;
    }

    ctx.fillStyle="red";
    ctx.fillRect(b.x,b.y,4,8);

    if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
      bullets.splice(i,1);
    }
  });

  // ducks
  ducks.forEach((d,i)=>{
    if(d.state==="flying") d.x+=d.speed;
    if(d.state==="attack") d.y+=5;

    drawDuck(d);

    bullets.forEach((b)=>{
      if(b.state!=="flying") return;
      let dx=b.x-d.x,dy=b.y-d.y;
      if(Math.sqrt(dx*dx+dy*dy)<d.r){
        b.state="idle";
        askQuestion(d,b);
      }
    });

    if(d.y>canvas.height||d.x<-50||d.x>canvas.width+50){
      ducks.splice(i,1);
    }
  });

  drawGun();

  // UI
  ctx.fillStyle="white";
  ctx.fillText("HP: "+hp,10,20);
  ctx.fillText("Score: "+score,10,40);

  // win/lose
  if(hp<=0){
    ctx.fillText("GAME OVER",canvas.width/2-40,canvas.height/2);
    return;
  }
  if(score>=15){
    ctx.fillText("YOU WIN",canvas.width/2-40,canvas.height/2);
    return;
  }

  requestAnimationFrame(update);
}

setInterval(spawnDuck,1000);
update();
</script>
</body>
</html>
